<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APVS Truck - Obrigado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden!important;max-width:100vw!important}
body{font-family:'Inter',system-ui,sans-serif;background:#001233;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;-webkit-font-smoothing:antialiased}
.page{width:100%;max-width:780px;margin-left:auto;margin-right:auto;padding:0 20px;box-sizing:border-box}

@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.obrigado{text-align:center;padding:60px 0 40px;animation:fadeUp .6s ease}
.obrigado .logo{width:100px;margin:0 auto 32px;display:block;animation:bounceIn .8s ease}
.obrigado .icon{font-size:4.5rem;margin-bottom:20px;animation:bounceIn .6s ease .2s both}
.obrigado h1{font-size:1.3rem;font-weight:800;color:#facc15;margin-bottom:24px;line-height:1.4}
.obrigado .card{background:linear-gradient(135deg,#0c2247 0%,#0a1e42 100%);border:1px solid #1e3a6e;border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;text-align:left;font-size:.9rem;color:#cbd5e1;line-height:1.5;animation:fadeUp .5s ease .3s both}
.obrigado .card .ci{font-size:1.5rem;flex-shrink:0}
.obrigado .card.wa{border-color:#1a4731;color:#25D366;font-weight:600;animation:fadeUp .5s ease .4s both}
.obrigado .footer{margin-top:36px;font-size:.78rem;color:#64748b;animation:fadeUp .5s ease .5s both}
.obrigado .footer a{color:#facc15;text-decoration:none;font-weight:600}
.obrigado .brand-footer{text-align:center;padding:0;animation:fadeUp .5s ease .6s both;border-top:1px solid #1e3a6e;margin-top:28px}
.obrigado .brand-footer-logos{display:grid;grid-template-columns:repeat(3,180px);gap:20px;justify-content:center;align-items:center;justify-items:center;margin-bottom:8px}
.obrigado .brand-logo-card{width:180px;height:120px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,193,7,.3);border-radius:12px;padding:16px;box-sizing:border-box;background:transparent;box-shadow:0 0 8px rgba(250,204,21,.08);transition:all .3s}
.obrigado .brand-logo-card:hover{border-color:#facc15;box-shadow:0 0 20px rgba(250,204,21,.25);transform:translateY(-2px)}
.obrigado .brand-logo-card img{max-width:100%;max-height:100%;object-fit:contain}

/* === RESPONSIVE === */

/* Tablet: 481px - 768px */
@media(max-width:768px){
  .obrigado .brand-footer-logos{grid-template-columns:repeat(3,150px);gap:14px}
  .obrigado .brand-logo-card{width:150px;height:100px;padding:12px}
  .obrigado h1{font-size:1.15rem}
}

/* Mobile: up to 480px */
@media(max-width:480px){
  .page{padding:0 16px}
  .obrigado{padding:40px 0 28px}
  .obrigado .logo{width:80px;margin-bottom:24px}
  .obrigado h1{font-size:clamp(1rem,5vw,1.3rem);margin-bottom:18px}
  .obrigado .card{padding:14px 16px;gap:12px;font-size:.85rem;margin-bottom:12px}
  .obrigado .card .ci{font-size:1.3rem}
  .obrigado .brand-footer-logos{grid-template-columns:repeat(2,1fr);gap:10px}
  .obrigado .brand-logo-card{width:100%;height:auto;aspect-ratio:3/2;padding:12px}
  .obrigado .brand-logo-card img{max-width:100%;max-height:100%;object-fit:contain}
  .obrigado .footer{font-size:.72rem;margin-top:28px}
  .obrigado .brand-footer{margin-top:20px}
}

/* Minimum touch targets */
a,button{min-height:48px;min-width:48px}

/* Overflow lockdown */
img,svg,.brand-logo-card,.page,.obrigado h1,.obrigado .card,.obrigado .footer{max-width:100%;box-sizing:border-box}
</style>
</head>
<body>
<div class="page">
  <div class="obrigado">
    <img src="Logo-Truck_Prancheta-1.png" alt="APVS Truck" class="logo" loading="lazy">
    <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg></div>
    <h1>Parabéns pela conscientização de buscar proteger sua ferramenta de trabalho.</h1>
    <div class="card">
      <span class="ci"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <span>Seus dados estão seguros e serão usados apenas para contato sobre sua proteção.</span>
    </div>
    <div class="card wa">
      <span class="ci"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></span>
      <span>Enviei uma mensagem de confirmação em seu WhatsApp sobre esse atendimento ✅</span>
    </div>
    <div class="footer"><a href="https://apvstruck.clubmindrecrutamento.com.br">APVS Truck</a> — A Proteção da Pesada
      <div class="brand-footer">
        <div class="brand-footer-logos">
          <div class="brand-logo-card" style="overflow:hidden"><img src="scania.svg" alt="Scania" loading="lazy" style="transform:scale(1.2);transform-origin:center"></div>
          <div class="brand-logo-card"><img src="volvo-logo-1.svg" alt="Volvo" loading="lazy"></div>
          <div class="brand-logo-card" style="overflow:hidden"><img src="volkswagen-9.svg" alt="Volkswagen" loading="lazy" style="width:70%;max-width:120px;display:block;margin:auto"></div>
          <div class="brand-logo-card"><img src="daf-2.svg" alt="DAF" loading="lazy" style="mix-blend-mode:screen;width:80%;max-width:140px;filter:contrast(1.1) brightness(0.95)"></div>
          <div class="brand-logo-card" style="overflow:hidden"><img src="man-1.svg" alt="MAN" loading="lazy" style="mix-blend-mode:multiply;width:60%;max-width:100px;display:block;margin:auto"></div>
          <div class="brand-logo-card"><img src="mercedes-benz-8.svg" alt="Mercedes-Benz" loading="lazy" style="display:block;margin:auto;width:60%;max-width:100px"></div>
        </div>
        <div class="brand-footer-logos">
          <div class="brand-logo-card"><img src="librelato.jpeg" alt="Librelato" loading="lazy"></div>
          <div class="brand-logo-card"><img src="Logotipo-Randon.jpg" alt="Randon" loading="lazy" style="mix-blend-mode:multiply"></div>
          <div class="brand-logo-card"><img src="guerra-logo-png_seeklogo-382967.png" alt="Guerra" loading="lazy" style="mix-blend-mode:multiply"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Send follow-up WhatsApp message after 60 seconds (only once per phone)
(function() {
  var params = new URLSearchParams(window.location.search);
  var phone = params.get('p');
  var text = params.get('m');
  if (!phone || !text) return;

  // Prevent duplicate sends on page reload
  var sentKey = 'msg2_sent_' + phone;
  if (localStorage.getItem(sentKey)) return;
  localStorage.setItem(sentKey, Date.now().toString());

  var UAZAPI_URL = 'https://wwwsolucoesdeia.uazapi.com';
  var UAZAPI_TOKEN = 'a7805dff-b592-45bf-999e-715591fe1a96';

  setTimeout(function() {
    fetch(UAZAPI_URL + '/send/text', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'token': UAZAPI_TOKEN
      },
      body: JSON.stringify({
        number: phone,
        text: text
      })
    }).then(function() {
      console.log('msg2-lead-60s');
    }).catch(function(e) { console.error('msg2-lead-60s error:', e); });
  }, 60000);

  // Clean up localStorage after 5 minutes to avoid stale entries
  setTimeout(function() {
    localStorage.removeItem(sentKey);
  }, 300000);
})();
</script>
</body>
</html>
