<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APVS Truck - Obrigado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#001233;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;-webkit-font-smoothing:antialiased}
.page{width:100%;max-width:520px;padding:0 20px}

@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.obrigado{text-align:center;padding:60px 0 40px;animation:fadeUp .6s ease}
.obrigado .logo{width:100px;margin:0 auto 32px;display:block;animation:bounceIn .8s ease}
.obrigado .icon{font-size:4.5rem;margin-bottom:20px;animation:bounceIn .6s ease .2s both}
.obrigado h1{font-size:1.3rem;font-weight:800;color:#facc15;margin-bottom:24px;line-height:1.4}
.obrigado .card{background:linear-gradient(135deg,#0c2247 0%,#0a1e42 100%);border:1px solid #1e3a6e;border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;text-align:left;font-size:.9rem;color:#cbd5e1;line-height:1.5;animation:fadeUp .5s ease .3s both}
.obrigado .card .ci{font-size:1.5rem;flex-shrink:0}
.obrigado .card.wa{border-color:#1a4731;color:#25D366;font-weight:600;animation:fadeUp .5s ease .4s both}
.obrigado .footer{margin-top:36px;font-size:.78rem;color:#64748b;animation:fadeUp .5s ease .5s both}
.obrigado .footer a{color:#facc15;text-decoration:none;font-weight:600}
.obrigado .brand-footer{text-align:center;padding:28px 0 0;animation:fadeUp .5s ease .6s both;border-top:1px solid #1e3a6e;margin-top:28px}
.obrigado .brand-footer-label{font-size:.68rem;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:12px}
.obrigado .brand-footer-logos{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.obrigado .brand-footer-logos img{height:26px;width:auto;opacity:.55;filter:brightness(0) invert(1);transition:all .3s}
.obrigado .brand-footer-logos img:hover{opacity:1;transform:scale(1.12);filter:brightness(0) invert(1) drop-shadow(0 0 6px rgba(250,204,21,.35))}
.obrigado .brand-footer-sublabel{font-size:.6rem;color:#475569;text-transform:uppercase;letter-spacing:1.2px;font-weight:500;margin:14px 0 10px}
</style>
</head>
<body>
<div class="page">
  <div class="obrigado">
    <img src="Logo-Truck_Prancheta-1.png" alt="APVS Truck" class="logo">
    <div class="icon">✅</div>
    <h1>Parabéns pela conscientização de buscar proteger sua ferramenta de trabalho.</h1>
    <div class="card">
      <span class="ci">🔒</span>
      <span>Seus dados estão seguros e serão usados apenas para contato sobre sua proteção.</span>
    </div>
    <div class="card wa">
      <span class="ci">💬</span>
      <span>Enviei uma mensagem de confirmação em seu WhatsApp sobre esse atendimento ✅</span>
    </div>
    <div class="footer">🚛 <a href="https://apvstruck.clubmindrecrutamento.com.br">APVS Truck</a> — A Proteção da Pesada
      <div class="brand-footer">
        <div class="brand-footer-label">Montadoras</div>
        <div class="brand-footer-logos">
          <img src="scania.svg" alt="Scania">
          <img src="volvo-logo-1.svg" alt="Volvo">
          <img src="volkswagen-9.svg" alt="Volkswagen">
          <img src="daf_caminhoes.png" alt="DAF">
          <img src="man-1.svg" alt="MAN">
          <img src="mercedes-benz-8.svg" alt="Mercedes-Benz">
        </div>
        <div class="brand-footer-sublabel">Agregados</div>
        <div class="brand-footer-logos">
          <img src="librelato.jpeg" alt="Librelato">
          <img src="randon.jpg" alt="Randon">
          <img src="guerra.jpg" alt="Guerra">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Send follow-up WhatsApp message after 60 seconds (only once per phone)
(function() {
  var params = new URLSearchParams(window.location.search);
  var phone = params.get('p');
  var text = params.get('m');
  if (!phone || !text) return;

  // Prevent duplicate sends on page reload
  var sentKey = 'msg2_sent_' + phone;
  if (localStorage.getItem(sentKey)) return;
  localStorage.setItem(sentKey, Date.now().toString());

  var UAZAPI_URL = 'https://wwwsolucoesdeia.uazapi.com';
  var UAZAPI_TOKEN = 'a7805dff-b592-45bf-999e-715591fe1a96';

  setTimeout(function() {
    fetch(UAZAPI_URL + '/send/text', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'token': UAZAPI_TOKEN
      },
      body: JSON.stringify({
        number: phone,
        text: text
      })
    }).then(function() {
      console.log('Msg 2 (follow-up) sent successfully');
    }).catch(function(e) { console.error('Follow-up send error:', e); });
  }, 60000);

  // Clean up localStorage after 5 minutes to avoid stale entries
  setTimeout(function() {
    localStorage.removeItem(sentKey);
  }, 300000);
})();
</script>
</body>
</html>
