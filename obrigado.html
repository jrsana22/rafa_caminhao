<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APVS Truck - Obrigado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#001233;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;-webkit-font-smoothing:antialiased}
.page{width:100%;max-width:520px;padding:0 20px}

@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.obrigado{text-align:center;padding:60px 0 40px;animation:fadeUp .6s ease}
.obrigado .logo{width:100px;margin:0 auto 32px;display:block;animation:bounceIn .8s ease}
.obrigado .icon{font-size:4.5rem;margin-bottom:20px;animation:bounceIn .6s ease .2s both}
.obrigado h1{font-size:1.3rem;font-weight:800;color:#facc15;margin-bottom:24px;line-height:1.4}
.obrigado .card{background:linear-gradient(135deg,#0c2247 0%,#0a1e42 100%);border:1px solid #1e3a6e;border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;text-align:left;font-size:.9rem;color:#cbd5e1;line-height:1.5;animation:fadeUp .5s ease .3s both}
.obrigado .card .ci{font-size:1.5rem;flex-shrink:0}
.obrigado .card.wa{border-color:#1a4731;color:#25D366;font-weight:600;animation:fadeUp .5s ease .4s both}
.obrigado .footer{margin-top:36px;font-size:.78rem;color:#64748b;animation:fadeUp .5s ease .5s both}
.obrigado .footer a{color:#facc15;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="page">
  <div class="obrigado">
    <img src="Logo-Truck_Prancheta-1.png" alt="APVS Truck" class="logo">
    <div class="icon">✅</div>
    <h1>Parabéns pela conscientização de buscar proteger sua ferramenta de trabalho.</h1>
    <div class="card">
      <span class="ci">🔒</span>
      <span>Seus dados estão seguros e serão usados apenas para contato sobre sua proteção.</span>
    </div>
    <div class="card wa">
      <span class="ci">💬</span>
      <span>Enviei uma mensagem de confirmação em seu WhatsApp sobre esse atendimento ✅</span>
    </div>
    <div class="footer">🚛 <a href="https://apvstruck.clubmindrecrutamento.com.br">APVS Truck</a> — A Proteção da Pesada</div>
  </div>
</div>
</body>
</html>
